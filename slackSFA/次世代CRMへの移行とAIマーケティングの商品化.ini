次世代CRMへの移行とAIマーケティングの商品化

スライド：戦略的背景
Agentforceの現状: SalesforceはAgentforceベースへ移行中だが、設定の「複雑さ」「価格の高さ」「パフォーマンス（重さ）」がハードルとなり、成功事例がまだ少ない。

勝機: 我々は高度な機能を「軽量・高速・安価」に提供する。特に、複雑な設定を強いるのではなく、AIが勝手に空気を読んで動く（Slackフロントエンド）というUXを武器にする。

スライド：タイトル
CRMの再定義：SalesforceリプレースとAIナーチャリングによる次世代営業基盤の提案

スライド：現状の課題とリプレースの目的
-コスト構造の改善: 高額なSalesforceライセンス料を最適化し、必要なリソース（GCP等）へ再分配する。

-営業現場の負担軽減: 「PCを開いて日報を入れる」手間を省き、現場の入力率とデータ鮮度を劇的に向上させる。
データの民主化: 蓄積したデータを自社基盤（GCP）に置くことで、AI活用や分析を自由自在に行う。

スライド：解決案：Slackフロントエンド × GCPバックエンド
UIの変革: 営業が1日中使っている「Slack」を入り口にする。コマンドやフォームで外出先から5秒で入力を完了。
強固なデータ基盤: 裏側はGCP（Cloud SQL / BigQuery）を採用。セキュアかつ、将来的なスケーラビリティを担保。
ハイブリッド構成: 大量データの閲覧や分析は、IAP（Google認証）で保護された軽量なWeb管理画面で行う。

スライド：目玉機能：AIベースの次世代ナーチャリング
「チラシ配り」からの脱却: Pardot等の「一律のシナリオ型MA」ではなく、AIが顧客の文脈を理解する「対話型ナーチャリング」へ。
非同期・個別対話: 顧客の疑問にAIが24時間365日、個別回答。深い納得感を与え、商談化率を最大化する。
営業連携: ナーチャリングの履歴は即座にSlackで営業担当に共有され、シームレスに人間が引き継げる。

スライド：今後の展望とメリット
圧倒的なスピード感: 自社でコントロール可能な基盤のため、最新AI（Gemini等）の進化を即座にビジネスに取り込める。

スライド：成功の定義（KPI）
短期: Salesforceのライセンスコスト削減額
中期: 営業担当のシステム入力時間の削減（1人あたり週3時間など）
長期: 外販プロダクトとしての受注数およびLTV（顧客生涯価値）

スライド：ロードマップ
短期集中で結果を出し、徐々にプロダクト化へ移行する3フェーズ構成です。

Phase 1: 基盤構築 & PoC (1.5〜2ヶ月)
目標: 特定の1チームで「Slackから顧客情報を入れられる」状態にする。
内容:
GCP (Cloud SQL / PostgreSQL) 基盤構築
Slack Bolt による入力・検索機能の実装
Salesforceからの特定データのインポート

Phase 2: 社内完全移行 & AI実装 (2〜3ヶ月)
目標: Salesforceを解約し、自社AIナーチャリングを実戦投入。
内容:
AIナーチャリングエンジン: Vertex AIによる非同期対話の実装。
Web管理画面 (Nuxt.js): IAP認証下での一括閲覧・編集画面の提供。
営業現場でのブラッシュアップ（ドッグフーディング）。

Phase 3: プロダクト化・外販準備 (3ヶ月〜)
目標: 外部企業へのベータ版提供開始。
内容:
マルチテナント化: 他社が自社環境として使える構成への変更。
パッケージ化: 導入マニュアル、価格体系の策定。
アーリーアダプター獲得: 実績（自社でのコスト削減・商談化率UP）をもとに営業開始。

